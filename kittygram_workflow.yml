name: Kittygram CI/CD

on:
  push:
    branches: [ main ]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  test:
    name: Проверка кода
    runs-on: ubuntu-latest
    
    # ДОБАВЛЯЕМ СЕРВИС POSTGRESQL
    services:
      db:
        image: postgres:13
        env:
          POSTGRES_DB: kittygram
          POSTGRES_USER: kittygram_user
          POSTGRES_PASSWORD: kittygram_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v3
      
      - name: Устанавливаем Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Устанавливаем зависимости для бэкенда
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff
      
      - name: Проверяем код через Ruff
        run: |
          cd backend
          ruff check .
      
      - name: Устанавливаем Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Устанавливаем зависимости фронтенда
        run: |
          cd frontend
          npm ci
      
      - name: Тестируем фронтенд
        run: |
          cd frontend
          npm test -- --watchAll=false
      
      # ДОБАВЛЯЕМ ПЕРЕМЕННЫЕ ОКРУЖЕНИЯ ДЛЯ ТЕСТОВ
      - name: Тестируем бэкенд
        env:
          POSTGRES_DB: kittygram
          POSTGRES_USER: kittygram_user
          POSTGRES_PASSWORD: kittygram_password
          DB_HOST: localhost
          DB_PORT: 5432
          SECRET_KEY: test-secret-key
          DEBUG: True
        run: |
          cd backend
          python manage.py test

  build_and_push:
    name: Собираем и публикуем образы
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Клонируем репозиторий
        uses: actions/checkout@v3
      
      - name: Настраиваем Docker
        uses: docker/setup-buildx-action@v2
      
      - name: Вход в Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      - name: Собираем и публикуем бэкенд
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/kittygram_backend:latest
      
      - name: Собираем и публикуем фронтенд
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/kittygram_frontend:latest
      
      - name: Собираем и публикуем gateway
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/kittygram_gateway:latest

  notify:
    name: Отправляем уведомление
    runs-on: ubuntu-latest
    needs: build_and_push
    if: always()
    
    steps:
      - name: Отправка в Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ env.TELEGRAM_CHAT_ID }}
          token: ${{ env.TELEGRAM_TOKEN }}
          message: |
            ✅ Киттиграм успешно обновлен!
            📦 Репозиторий: ${{ github.repository }}
            📝 Коммит: ${{ github.event.head_commit.message }}
            👤 Автор: ${{ github.event.head_commit.author.name }}