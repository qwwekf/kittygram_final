name: Kittygram CI/CD

# Когда запускается
on:
  push:
    branches: [ main ]  # Только при пуше в main

# Переменные окружения
env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  # 1. ТЕСТИРОВАНИЕ
  test:
    name: Проверка кода
    runs-on: ubuntu-latest
    
    steps:
      # Загружаем код из GitHub
      - name: Клонируем репозиторий
        uses: actions/checkout@v3
      
      # Настраиваем Python
      - name: Устанавливаем Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      # Устанавливаем зависимости для бэкенда
      - name: Устанавливаем зависимости
        run: |
          cd backend
          pip install -r requirements.txt
          pip install ruff
      
      # Проверяем стиль кода
      - name: Проверяем код через Ruff
        run: |
          cd backend
          ruff check .
      
      # Настраиваем Node.js для фронтенда
      - name: Устанавливаем Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      # Устанавливаем зависимости фронтенда
      - name: Устанавливаем зависимости фронтенда
        run: |
          cd frontend
          npm ci
      
      # Запускаем тесты фронтенда
      - name: Тестируем фронтенд
        run: |
          cd frontend
          npm test -- --watchAll=false
      
      # Запускаем тесты бэкенда
      - name: Тестируем бэкенд
        run: |
          cd backend
          python manage.py test

  # 2. СБОРКА И ПУБЛИКАЦИЯ
  build_and_push:
    name: Собираем и публикуем образы
    runs-on: ubuntu-latest
    needs: test  # Запускаем только после успешных тестов
    
    steps:
      # Загружаем код
      - name: Клонируем репозиторий
        uses: actions/checkout@v3
      
      # Настраиваем Docker
      - name: Настраиваем Docker
        uses: docker/setup-buildx-action@v2
      
      # Входим в Docker Hub
      - name: Вход в Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}
      
      # Собираем и публикуем бэкенд
      - name: Бэкенд
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/kittygram_backend:latest
      
      # Собираем и публикуем фронтенд
      - name: Фронтенд
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/kittygram_frontend:latest
      
      # Собираем и публикуем gateway
      - name: Gateway
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/kittygram_gateway:latest

  # 3. УВЕДОМЛЕНИЕ В TELEGRAM
  notify:
    name: Отправляем уведомление
    runs-on: ubuntu-latest
    needs: build_and_push
    
    steps:
      - name: Отправка в Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ env.TELEGRAM_CHAT_ID }}
          token: ${{ env.TELEGRAM_TOKEN }}
          message: |
            ✅ Киттиграм успешно обновлен!
            📦 Репозиторий: ${{ github.repository }}
            📝 Коммит: ${{ github.event.head_commit.message }}
            👤 Автор: ${{ github.event.head_commit.author.name }}